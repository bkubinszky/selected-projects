<article class="relative bg-slate-100 dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 hover:-translate-y-1 hover:border-blue-200 dark:hover:border-blue-800 transition-all duration-300 p-7 flex flex-col">
  <a href="{{ .RelPermalink }}" class="absolute inset-0 z-10" aria-hidden="true" tabindex="-1"></a>

  <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-white dark:bg-blue-900/30 border border-blue-100 dark:border-transparent mb-6">
    <ion-icon name="{{ .Params.icon | default "calendar-outline" }}" class="text-2xl text-blue-600 dark:text-blue-300"></ion-icon>
  </div>

  <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 relative z-20 mb-3">
    <a href="{{ .RelPermalink }}" class="hover:text-blue-600 dark:hover:text-blue-400 transition">{{ .LinkTitle }}</a>
  </h3>

  <p class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed mb-6">
    {{ if isset .Params "description" | and (ne .Params.description "") -}}
      {{ .Description | markdownify }}
    {{- else -}}
      {{ .Summary | strings.Truncate 120 }}
    {{- end }}
  </p>

  {{ with .Params.tags }}
    <div class="mt-auto flex flex-wrap gap-2.5 relative z-20">
      {{ range . }}
        <span class="text-xs font-mono uppercase tracking-wide bg-white dark:bg-blue-900/30 border border-blue-100 dark:border-transparent text-blue-700 dark:text-blue-300 px-2 py-1 rounded">
          {{ . }}
        </span>
      {{ end }}
    </div>
  {{ end }}
</article>
