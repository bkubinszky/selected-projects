<footer class="container mx-auto flex justify-center items-center text-sm pt-10 pb-6 flex-wrap gap-4 text-gray-700 dark:text-gray-300">
    <div>
         {{ if .Site.Params.footer.content }}
             {{ .Site.Params.footer.content | .RenderString }}
         {{ else }}
            {{ now.Year }} &copy; {{ .Site.Title }}. All Rights Reserved.
        {{ end }}
    </div>
</footer>
