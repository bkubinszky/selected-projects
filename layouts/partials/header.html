<header class="pt-4 dark:bg-gray-900" x-data="{}">
    <div class="container mx-auto py-8">
        <div class="flex flex-row justify-between items-center">
            <h1 id="logo">
                <a href="{{ absURL "" }}" title="{{ site.Title }}"
                   class="text-2xl antialiased font-extrabold hover:text-orange-600 dark:hover:text-orange-400 dark:text-gray-100 transition ease-in-out">{{ site.Title }}</a>
            </h1>

            <div class="flex items-center gap-2">
                {{ with site.Params.social.github }}
                <a href="{{ . }}" target="_blank" rel="noopener noreferrer" title="GitHub"
                   class="text-gray-700 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 transition ease-in-out p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <ion-icon name="logo-github" class="text-xl" aria-hidden="true"></ion-icon>
                </a>
                {{ end }}

                {{ with site.Params.social.linkedin }}
                <a href="{{ . }}" target="_blank" rel="noopener noreferrer" title="LinkedIn"
                   class="text-gray-700 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 transition ease-in-out p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <ion-icon name="logo-linkedin" class="text-xl" aria-hidden="true"></ion-icon>
                </a>
                {{ end }}

                {{ with site.Params.social.email }}
                <a href="mailto:{{ . }}" title="E-Mail"
                   class="text-gray-700 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 transition ease-in-out p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <ion-icon name="mail-outline" class="text-xl" aria-hidden="true"></ion-icon>
                </a>
                {{ end }}

                {{ partial "theme-toggle.html" . }}

                {{- if site.Params.enableSiteSearch }}
                <button
                  id="search-desktop"
                  type="button"
                  @click="$dispatch('search-toggle')"
                  class="text-gray-700 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 transition ease-in-out p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-orange-500 dark:focus:ring-orange-400"
                  aria-label="Open search"
                  aria-expanded="false"
                  aria-keyshortcuts="Cmd+K"
                >
                  <ion-icon name="search" class="text-xl" aria-hidden="true"></ion-icon>
                </button>
                {{- end }}
            </div>
        </div>
    </div>
</header>
