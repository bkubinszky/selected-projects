{{ define "main" }}
  {{ if or .Params.title .Content .Params.image }}
   <div id="home-banner" class="rounded-lg shadow py-10 px-6 bg-linear-to-r from-slate-100 to-blue-50 dark:from-slate-800 dark:to-slate-900">
  <div class="container mx-auto p-4 flex flex-col md:flex-row items-stretch space-y-6 md:space-y-0 md:space-x-8">
    <div class="flex-1 prose flex flex-col justify-center">
      {{ with .Params.title }}<h2 class=" font-bold text-gray-900 dark:text-gray-100">{{ . }}</h2>{{ end }}
      {{ with .Content }}<div class="text-gray-700 dark:text-gray-300 mt-4 prose dark:prose-invert">{{ . }}</div>{{ end }}
    </div>
    {{ with .Params.image }}
    <div class="flex-1 flex justify-center">
      <img src="{{ . }}" alt="{{ $.Params.title }}" class="rounded w-full max-w-xs md:max-w-sm h-full object-cover shadow-xl">
    </div>
    {{ end }}
  </div>
</div>
  {{ end }}
  <section class="container mx-auto mt-12 grid gap-6 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
  {{ range site.RegularPages }}
    {{ partial "post-card.html" . }}
  {{ end }}
  </section>
{{ end }}
