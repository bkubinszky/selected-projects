baseURL: 'http://localhost:1313/'
locale: 'de-de'
title: 'Selected Projects'
theme: 'fortyten'

params:
  description: "Ein persönlicher Blog mit FortyTen"
  keywords: "Hugo, Blog, Theme"
  enableSiteSearch: false
  author:
    name: "Balázs Kubinszky"
    email: "balazs.kubinszky@gmail.com"
  social:
    github: "https://github.com/bkubinszky"
    linkedin: "https://www.linkedin.com/in/bkub/"
    email: "mailto:balazs.kubinszky@gmail.com"

build:
  buildStats:
    enable: true
  cachebusters:
    - source: 'assets/notwatching/hugo_stats\.json'
      target: css
    - source: '(postcss|tailwind)\.config\.js'
      target: css
module:
  mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json